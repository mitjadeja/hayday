<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Hay Day Order Manager PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#020617;
color:#e5e7eb;
font-family:Inter,Arial;
padding:12px;
animation:fadePage .6s ease;
overflow-x:hidden;
}

/* glowing background */

body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#22c55e33,transparent);
top:-200px;
left:-200px;
filter:blur(120px);
z-index:-1;
}

/* page animation */

@keyframes fadePage{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
}
}

/* title */

h1{
text-align:center;
margin-bottom:10px;
letter-spacing:1px;
}

/* cards */

.card{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
padding:14px;
margin-bottom:14px;
backdrop-filter:blur(8px);

transition:.3s;
animation:cardIn .5s ease;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

@keyframes cardIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
}
}

/* inputs */

input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:#e5e7eb;
}

/* buttons */

button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
font-weight:600;
cursor:pointer;
background:#22c55e;

transition:.25s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(34,197,94,.4);
}

button.gray{background:#475569}
button.danger{background:#ef4444}
button.orange{background:#f97316}

/* ripple effect */

button{
position:relative;
overflow:hidden;
}

button::after{
content:"";
position:absolute;
width:10px;
height:10px;
background:rgba(255,255,255,.4);
border-radius:50%;
opacity:0;
transform:scale(0);
}

button:active::after{
animation:ripple .6s;
}

@keyframes ripple{
to{
opacity:0;
transform:scale(20);
}
}

/* table */

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border-bottom:1px solid #334155;
padding:7px;
text-align:center;
}

tr{
transition:.25s;
animation:rowFade .4s ease;
}

tr:hover{
background:#1e293b;
transform:scale(1.01);
}

@keyframes rowFade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
}
}

/* popup */

#popup,#pinLock{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
padding:10px;
z-index:10;
}

.popupBox{
background:#020617;
padding:16px;
border-radius:12px;
max-width:650px;
margin:auto;
max-height:90vh;
overflow:auto;

animation:popup .3s ease;
}

@keyframes popup{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div id="pinLock" style="display:block">

<div class="popupBox">
<h3>Enter PIN</h3>
<input id="pinInput" type="password">
<button onclick="checkPin()">Unlock</button>
</div>

</div>

<div id="app" style="display:none">

<h1>Hay Day Order Manager</h1>

<div class="card">

<input id="search" placeholder="Search customer">

<input id="customerName" placeholder="Customer Name">

<textarea id="tags" rows="4" placeholder="Paste tags (one per line)"></textarea>

<button id="sendBtn">Add / Send Tags</button>

<button class="gray" onclick="sortRemaining()">Sort by Remaining</button>

</div>

<div class="card" id="stats"></div>

<div class="card">

<table>

<thead>
<tr>
<th>No</th>
<th>Name</th>
<th>Total</th>
<th>Remaining</th>
<th>Pending</th>
<th>View</th>
<th>Edit</th>
<th>Error+</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

</div>

<div id="popup">

<div class="popupBox">

<h3 id="popupTitle"></h3>

<h4>Pending Tags</h4>
<textarea id="pendingBox" rows="5"></textarea>

<h4>Sent Tags</h4>
<textarea id="sentBox" rows="5" readonly></textarea>

<button onclick="copyPending()">Copy Pending</button>

<button class="gray" onclick="markDone()">DONE</button>

<button class="danger" onclick="closePopup()">Close</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyDFymz_wZqg0UnE2ShLsUSvdjG9uUU2N6w",
authDomain:"hayday-pro-manager.firebaseapp.com",
projectId:"hayday-pro-manager"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

const SELL_PRICE=4.5;
const COST_PRICE=3;

let orders=[];
let currentIndex=null;

const nameInput=document.getElementById("customerName");
const tagsInput=document.getElementById("tags");
const list=document.getElementById("list");
const stats=document.getElementById("stats");
const pendingBox=document.getElementById("pendingBox");
const sentBox=document.getElementById("sentBox");
const popup=document.getElementById("popup");
const popupTitle=document.getElementById("popupTitle");
const search=document.getElementById("search");

function checkPin(){

const pin=document.getElementById("pinInput").value;

if(pin==="1912"){

document.getElementById("pinLock").style.display="none";
document.getElementById("app").style.display="block";

}else alert("Wrong PIN")

}

function render(){

let html="";
let sentTotal=0;

const filtered=orders.filter(o=>o.name.toLowerCase().includes(search.value.toLowerCase()));

filtered.forEach((o,i)=>{

if(o.remaining===0 && o.pendingTags.length===0) return;

sentTotal+=o.sentTags.length;

const high=o.pendingTags.length>50?"pendingHigh":"";

html+=`
<tr class="${high}">
<td>${i+1}</td>
<td>${o.name}</td>
<td>${o.total}</td>
<td>${o.remaining}</td>
<td>${o.pendingTags.length}</td>
<td><button onclick="viewOrder(${i})">View</button></td>
<td><button class="gray" onclick="editOrder(${i})">Edit</button></td>
<td><button class="orange" onclick="addErrorTags(${i})">Error+</button></td>
<td><button class="danger" onclick="deleteOrder(${i})">Delete</button></td>
</tr>
`

})

list.innerHTML=html||"<tr><td colspan=9>No Orders</td></tr>";

const profit=((sentTotal/100)*SELL_PRICE-(sentTotal/100)*COST_PRICE).toFixed(2);

stats.innerHTML=`
<div class="stat"><b>Total Sent:</b> ${sentTotal}</div>
<div class="stat"><b>Profit:</b> ${profit} USDT</div>
`;

}

document.getElementById("sendBtn").onclick=sendTags;

document.addEventListener("keydown",(e)=>{

if(e.ctrlKey && e.key==="Enter") sendTags();

});

async function sendTags(){

const name=nameInput.value.trim();

if(!name)return alert("Enter name");

let o=orders.find(x=>x.name.toLowerCase()===name.toLowerCase());

if(!o){

const total=prompt("Enter total order");

if(!total)return;

o={name,total:+total,remaining:+total,sentTags:[],pendingTags:[]};

const ref=await db.collection("orders").add(o);

o.id=ref.id;

orders.push(o);

render();

return;

}

const arr=tagsInput.value.trim().split(/\n/).filter(Boolean);

if(arr.length){

if(arr.length>o.remaining){

if(!confirm("Tags remaining se zyada hain, continue?")) return;

}

o.pendingTags.push(...arr);

o.remaining-=arr.length;

await db.collection("orders").doc(o.id).set(o);

render();

}

tagsInput.value="";

}

function sortRemaining(){

orders.sort((a,b)=>b.remaining-a.remaining);

render();

}

function viewOrder(i){

currentIndex=i;

const o=orders[i];

popupTitle.innerText=o.name+" | Remaining "+o.remaining;

pendingBox.value=o.pendingTags.join("\n");

sentBox.value=o.sentTags.join("\n");

popup.style.display="block";

}

function closePopup(){popup.style.display="none"}

async function markDone(){

const o=orders[currentIndex];

o.sentTags.push(...o.pendingTags);

o.pendingTags=[];

await db.collection("orders").doc(o.id).set(o);

render();

closePopup();

}

function copyPending(){

navigator.clipboard.writeText(pendingBox.value);

alert("Copied");

}

async function editOrder(i){

const o=orders[i];

const nt=prompt("Edit total",o.total);

if(nt!==null){

o.total=parseInt(nt);

o.remaining=o.total-(o.sentTags.length+o.pendingTags.length);

await db.collection("orders").doc(o.id).set(o);

render();

}

}

async function addErrorTags(i){

const o=orders[i];

const err=prompt("Error tags");

if(!err)return;

const num=parseInt(err);

o.total+=num;

o.remaining+=num;

await db.collection("orders").doc(o.id).set(o);

render();

}

async function deleteOrder(i){

if(confirm("Delete order?")){

await db.collection("orders").doc(orders[i].id).delete();

orders.splice(i,1);

render();

}

}

search.oninput=render;

db.collection("orders").onSnapshot(snap=>{

orders=snap.docs.map(d=>({id:d.id,...d.data()}));

orders.forEach(o=>{

if(!o.sentTags)o.sentTags=[];
if(!o.pendingTags)o.pendingTags=[];

o.remaining=o.total-(o.sentTags.length+o.pendingTags.length);

});

render();

});

</script>

</body>
</html>
