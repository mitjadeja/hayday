<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Hay Day Order Manager PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#14532d;
color:#ecfdf5;
font-family:Arial;
padding:12px;
overflow-x:hidden;
}

/* pin screen */

#pinLock{
display:flex;
position:fixed;
inset:0;
background:#022c22;
align-items:center;
justify-content:center;
z-index:100;
}

.popupBox{
background:#064e3b;
padding:20px;
border-radius:12px;
width:300px;
text-align:center;
}

input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #16a34a;
background:white;
color:black;
font-size:16px;
}

/* buttons */

button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:none;
cursor:pointer;
background:#22c55e;
color:white;
font-weight:600;
}

button.gray{background:#475569}
button.orange{background:#f97316}
button.danger{background:#ef4444}

button:hover{
transform:scale(1.05);
}

/* cards */

.card{
background:#065f46;
padding:14px;
border-radius:12px;
margin-bottom:14px;
}

/* table */

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:7px;
border-bottom:1px solid #16a34a;
text-align:center;
}

/* progress bar */

.progress{
height:10px;
background:#064e3b;
border-radius:10px;
overflow:hidden;
}

.progress div{
height:100%;
background:#84cc16;
}

/* popup */

#popup{
display:none;
position:fixed;
inset:0;
background:#000000cc;
padding:10px;
z-index:20;
}

#receiptPopup{
display:none;
position:fixed;
inset:0;
background:#000000cc;
align-items:center;
justify-content:center;
z-index:30;
}

#receiptBox{
background:#fefce8;
color:black;
border-radius:12px;
padding:20px;
width:320px;
text-align:center;
}

</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div id="pinLock">

<div class="popupBox">

<h3>Enter PIN</h3>

<input id="pinInput" type="password" autofocus>

<button onclick="checkPin()">Unlock</button>

</div>

</div>

<div id="app" style="display:none">

<h1>🐔 Hay Day Order Manager</h1>

<button onclick="toggleMode()" class="gray">Light / Dark</button>

<div class="card">

<input id="search" placeholder="Search customer">

<input id="customerName" placeholder="Customer Name">

<textarea id="tags" rows="4" placeholder="Paste tags"></textarea>

<button id="sendBtn">Add / Send Tags</button>

<button class="gray" onclick="sortRemaining()">Sort Remaining</button>

</div>

<div class="card" id="stats"></div>

<div class="card">

<table>

<thead>
<tr>
<th>No</th>
<th>Client</th>
<th>Progress</th>
<th>Total</th>
<th>Remaining</th>
<th>Pending</th>
<th>View</th>
<th>Edit</th>
<th>Error</th>
<th>Slip</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

</div>

<div id="popup">

<div class="popupBox">

<h3 id="popupTitle"></h3>

<h4>Pending Tags</h4>

<textarea id="pendingBox" rows="5"></textarea>

<h4>Sent Tags</h4>

<textarea id="sentBox" rows="5" readonly></textarea>

<button onclick="copyPending()">Copy Pending</button>

<button onclick="markDone()">DONE</button>

<button onclick="closePopup()">Close</button>

</div>

</div>

<div id="receiptPopup">

<div id="receiptBox">

<h2>Hay Day Delivery</h2>

<p>Ordered By : <b>Mit Raj</b></p>

<hr>

<div id="receiptContent"></div>

<hr>

<p>1 Tag = 1 Minute Delivery</p>

<button onclick="copyReceipt()">Copy</button>

<button onclick="printReceipt()">Print</button>

<button onclick="closeReceipt()">Close</button>

</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyDFymz_wZqg0UnE2ShLsUSvdjG9uUU2N6w",
authDomain:"hayday-pro-manager.firebaseapp.com",
projectId:"hayday-pro-manager"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let orders=[];
let currentOrder=null;

const nameInput=document.getElementById("customerName");
const tagsInput=document.getElementById("tags");
const list=document.getElementById("list");
const stats=document.getElementById("stats");
const pendingBox=document.getElementById("pendingBox");
const sentBox=document.getElementById("sentBox");
const popup=document.getElementById("popup");
const popupTitle=document.getElementById("popupTitle");
const search=document.getElementById("search");

/* enter unlock */

document.getElementById("pinInput").addEventListener("keypress",function(e){
if(e.key==="Enter") checkPin();
});

function toggleMode(){
document.body.classList.toggle("light");
}

function checkPin(){

const pin=document.getElementById("pinInput").value;

if(pin==="1912"){

document.getElementById("pinLock").style.display="none";
document.getElementById("app").style.display="block";

}else alert("Wrong PIN")

}

function render(){

let html="";
let sentTotal=0;

const filtered=orders.filter(o=>o.name.toLowerCase().includes(search.value.toLowerCase()));

filtered.forEach((o,i)=>{

sentTotal+=o.sentTags.length;

const percent=((o.sentTags.length/o.total)*100).toFixed(0)

html+=`
<tr>
<td>${i+1}</td>
<td>${o.name}</td>
<td>
<div class="progress">
<div style="width:${percent}%"></div>
</div>
${percent}%
</td>
<td>${o.total}</td>
<td>${o.remaining}</td>
<td>${o.pendingTags.length}</td>
<td><button onclick="viewOrder('${o.id}')">View</button></td>
<td><button class="gray" onclick="editOrder('${o.id}')">Edit</button></td>
<td><button class="orange" onclick="addErrorTags('${o.id}')">Error+</button></td>
<td><button onclick="generateSlip('${o.id}')">Slip</button></td>
<td><button class="danger" onclick="deleteOrder('${o.id}')">Delete</button></td>
</tr>
`

})

list.innerHTML=html

stats.innerHTML=`Total Sent : ${sentTotal}`

}

document.getElementById("sendBtn").onclick=sendTags;

async function sendTags(){

const name=nameInput.value.trim();
if(!name)return alert("Enter name");

let o=orders.find(x=>x.name.toLowerCase()===name.toLowerCase());

if(!o){

const total=prompt("Enter total order");
if(!total)return;

o={name,total:+total,remaining:+total,sentTags:[],pendingTags:[]};

const ref=await db.collection("orders").add(o);
o.id=ref.id;

orders.push(o);
render();
return;

}

const arr=tagsInput.value.trim().split(/\n/).filter(Boolean);

if(arr.length){

o.pendingTags.push(...arr);
o.remaining-=arr.length;

await db.collection("orders").doc(o.id).set(o);

render();

}

tagsInput.value="";

}

function sortRemaining(){
orders.sort((a,b)=>b.remaining-a.remaining);
render();
}

function viewOrder(id){

const o=orders.find(x=>x.id===id);
currentOrder=o;

popupTitle.innerText=o.name+" | Remaining "+o.remaining;

pendingBox.value=o.pendingTags.join("\n");
sentBox.value=o.sentTags.join("\n");

popup.style.display="block";

}

function closePopup(){popup.style.display="none"}

async function markDone(){

currentOrder.sentTags.push(...currentOrder.pendingTags);
currentOrder.pendingTags=[];

await db.collection("orders").doc(currentOrder.id).set(currentOrder);

render();
closePopup();

}

function copyPending(){
navigator.clipboard.writeText(pendingBox.value);
alert("Copied")
}

async function editOrder(id){

const o=orders.find(x=>x.id===id);

const nt=prompt("Edit total",o.total);

if(nt!==null){

o.total=parseInt(nt);
o.remaining=o.total-(o.sentTags.length+o.pendingTags.length);

await db.collection("orders").doc(o.id).set(o);

render();

}

}

async function addErrorTags(id){

const o=orders.find(x=>x.id===id);

const err=prompt("Error tags");
if(!err)return;

const num=parseInt(err);

o.total+=num;
o.remaining+=num;

await db.collection("orders").doc(o.id).set(o);

render();

}

async function deleteOrder(id){

if(confirm("Delete order?")){

await db.collection("orders").doc(id).delete();

orders=orders.filter(o=>o.id!==id);

render();

}

}

function generateSlip(id){

const o=orders.find(x=>x.id===id)

const sent=o.sentTags.length
const remaining=o.remaining
const total=o.total
const time=sent

document.getElementById("receiptContent").innerHTML=
`
Client : ${o.name}<br><br>
Tags Sent : ${sent}<br>
Tags Remaining : ${remaining}<br>
Total Tags Bought : ${total}<br><br>
Order Status :  Running <br> 
Delivery Time : ${time} minutes
`

document.getElementById("receiptPopup").style.display="flex"

}

function closeReceipt(){
document.getElementById("receiptPopup").style.display="none"
}

function copyReceipt(){

const text=document.getElementById("receiptContent").innerText

navigator.clipboard.writeText(
"HAY DAY DELIVERY\n\nOrdered By : Mit Raj\n\n"+text+"\n\n1 Tag = 1 Minute Delivery"
)

alert("Receipt copied")

}

function printReceipt(){

const printContent=document.getElementById("receiptBox").innerHTML

const win=window.open("","","width=400,height=600")

win.document.write(printContent)

win.print()

}

search.oninput=render;

db.collection("orders").onSnapshot(snap=>{

orders=snap.docs.map(d=>({id:d.id,...d.data()}));

orders.forEach(o=>{

if(!o.sentTags)o.sentTags=[];
if(!o.pendingTags)o.pendingTags=[];

o.remaining=o.total-(o.sentTags.length+o.pendingTags.length);

});

render();

});

</script>

</body>
</html>
